<!doctype html>
<html lang="id">

<head>
    <title>Pendaftaran | Sistem Informasi GMNI</title>
    <!-- [Meta] -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0, minimal-ui" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="description" content="Sistem Informasi Manajemen GMNI" />
    <meta name="author" content="GMNI Dev Team" />

    <!-- [Favicon] icon -->
    <link rel="icon" href="../assets/images/favicon.svg" type="image/x-icon" />
    <!-- [Google Font] Family -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
        id="main-font-link" />
    <!-- [phosphor Icons] https://phosphoricons.com/ -->
    <link rel="stylesheet" href="../assets/fonts/phosphor/duotone/style.css" />
    <!-- [Tabler Icons] https://tablericons.com -->
    <link rel="stylesheet" href="../assets/fonts/tabler-icons.min.css" />
    <!-- [Feather Icons] https://feathericons.com -->
    <link rel="stylesheet" href="../assets/fonts/feather.css" />
    <!-- [Font Awesome Icons] https://fontawesome.com/icons -->
    <link rel="stylesheet" href="../assets/fonts/fontawesome.css" />
    <!-- [Material Icons] https://fonts.google.com/icons -->
    <link rel="stylesheet" href="../assets/fonts/material.css" />
    <!-- [Template CSS Files] -->
    <link rel="stylesheet" href="../assets/css/style.css" id="main-style-link" />
    <link rel="stylesheet" href="../assets/css/style-preset.css" />
    <link rel="stylesheet" href="../assets/css/custom-style.css" />

</head>
<!-- [Head] end -->
<!-- [Body] Start -->

<body>
    <!-- [ Pre-loader ] start -->
    <div class="loader-bg">
        <div class="loader-track">
            <div class="loader-fill"></div>
        </div>
    </div>
    <!-- [ Pre-loader ] End -->

    <div class="auth-main">
        <div class="auth-wrapper v3">
            <div class="auth-form">
                <div class="card mt-5">
                    <div class="card-body">
                        <a href="#" class="d-flex justify-content-center mt-3 text-decoration-none">
                            <h3 class="m-0 fw-bold text-primary">GMNI SYSTEM</h3>
                        </a>
                        <div class="row">
                            <div class="d-flex justify-content-center">
                                <div class="auth-header">
                                    <h2 class="text-secondary mt-5"><b>Pendaftaran</b></h2>
                                    <p class="f-16 mt-2">Isi data diri anda untuk mendaftar</p>
                                </div>
                            </div>
                        </div>

                        <!-- <button type="button" class="btn mt-2 bg-light-primary bg-light text-muted" style="width: 100%">
                            <img src="../assets/images/authentication/google-icon.svg" alt="image" />Sign Up With Google
                        </button>
                        <div class="saprator mt-3">
                            <span>or</span>
                        </div> -->

                        <h5 class="my-4 d-flex justify-content-center">Daftar dengan Email</h5>
                        <form action="login.html">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="floatingInputName"
                                    placeholder="Nama Lengkap" />
                                <label for="floatingInputName">Nama Lengkap</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="floatingInputWA"
                                    placeholder="Nomor WhatsApp" />
                                <label for="floatingInputWA">Nomor WhatsApp</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" id="floatingInputEmail"
                                    placeholder="Alamat Email" />
                                <label for="floatingInputEmail">Alamat Email</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="password" class="form-control" id="floatingInputPassword"
                                    placeholder="Password" />
                                <label for="floatingInputPassword">Password</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="password" class="form-control" id="floatingInputConfirmHash"
                                    placeholder="Konfirmasi Password" />
                                <label for="floatingInputConfirmHash">Konfirmasi Password</label>
                            </div>

                            <div class="form-check mt-3s">
                                <input class="form-check-input input-primary" type="checkbox" id="customCheckc1"
                                    checked="" />
                                <label class="form-check-label" for="customCheckc1">
                                    <span class="h5 mb-0">Saya setuju dengan <span>Syarat & Ketentuan.</span></span>
                                </label>
                            </div>
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-secondary p-2">Daftar Sekarang</button>
                            </div>
                        </form>
                        <hr />
                        <h5 class="d-flex justify-content-center">Sudah punya akun? <a href="login.html"
                                class="ms-2">Login Disini</a></h5>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- [ Main Content ] end -->
    <!-- Required Js -->
    <script src="../assets/js/plugins/popper.min.js"></script>
    <script src="../assets/js/plugins/simplebar.min.js"></script>
    <script src="../assets/js/plugins/bootstrap.min.js"></script>
    <script src="../assets/js/fonts/custom-font.js"></script>
    <script src="../assets/js/script.js"></script>
    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/plugins/feather.min.js"></script>

    <script>
        layout_change('light');
    </script>
    <script>
        layout_caption_change('true');
    </script>
    <script>
        layout_rtl_change('false');
    </script>
    <script>
        preset_change('preset-1');
    </script>


</body>
<!-- [Body] end -->

</html>
